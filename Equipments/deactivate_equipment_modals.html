    <div class="modal-dialog">
        <div class="modal-content">
            <div class="modal-header bg-success text-white">
                <h5 class="modal-title">
                    <i class="fas fa-check-circle"></i> إعادة تفعيل آلية
                </h5>
                <button type="button" class="btn-close btn-close-white" data-bs-dismiss="modal"></button>
            </div>
            <div class="modal-body">
                <div class="alert alert-info">
                    <i class="fas fa-info-circle"></i> 
                    ستتمكن من استخدام هذه الآلية مجدداً بعد الموافقة على هذا الطلب
                </div>
                <input type="hidden" id="reactivateEquipmentId" value="">
                
                <div class="mb-3">
                    <label class="form-label">كود الآلية</label>
                    <input type="text" class="form-control" id="reactivateEquipmentCode" disabled>
                </div>
                
                <div class="mb-3">
                    <label class="form-label">اسم الآلية</label>
                    <input type="text" class="form-control" id="reactivateEquipmentName" disabled>
                </div>
                
                <div class="mb-3">
                    <label class="form-label">تاريخ إعادة التفعيل</label>
                    <input type="date" class="form-control" id="reactivateEquipmentDate" value="<?php echo date('Y-m-d'); ?>">
                </div>
                
                <div class="mb-3">
                    <label class="form-label" for="reactivateEquipmentReason">
                        <i class="fas fa-comment"></i> ملاحظات
                    </label>
                    <textarea id="reactivateEquipmentReason" class="form-control" rows="3" placeholder="أضف أي ملاحظات..."></textarea>
                </div>
            </div>
            <div class="modal-footer">
                <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">
                    <i class="fas fa-times"></i> إلغاء
                </button>
                <button type="button" class="btn btn-success" id="submitReactivateEquipmentBtn">
                    <i class="fas fa-check-circle"></i> إعادة التفعيل
                </button>
            </div>
        </div>
    </div>
</div>

<script>
$(function() {
    const deactivateModal = new bootstrap.Modal(document.getElementById('deactivateEquipmentModal'), { keyboard: false });
    const reactivateModal = new bootstrap.Modal(document.getElementById('reactivateEquipmentModal'), { keyboard: false });

    // فتح نموذج الإيقاف
    $(document).on('click', '.deactivateEquipmentBtn', function() {
        const btn = $(this);
        const equipmentId = btn.data('id');
        const equipmentCode = btn.data('code');
        const equipmentName = btn.data('name');
        const status = btn.data('status');

        if (status === 'موقوفة للصيانة') {
            alert('هذه الآلية موقوفة بالفعل');
            return;
        }

        $('#deactivateEquipmentId').val(equipmentId);
        $('#deactivateEquipmentCode').val(equipmentCode);
        $('#deactivateEquipmentName').val(equipmentName);
        $('#deactivateEquipmentReason').val('');
        $('#deactivateEquipmentDate').val('<?php echo date('Y-m-d'); ?>');

        deactivateModal.show();
    });

    // فتح نموذج إعادة التفعيل
    $(document).on('click', '.reactivateEquipmentBtn', function() {
        const btn = $(this);
        const equipmentId = btn.data('id');
        const equipmentCode = btn.data('code');
        const equipmentName = btn.data('name');
        const status = btn.data('status');

        if (status !== 'موقوفة للصيانة') {
            alert('لا يمكن إعادة تفعيل آلية غير موقوفة');
            return;
        }

        $('#reactivateEquipmentId').val(equipmentId);
        $('#reactivateEquipmentCode').val(equipmentCode);
        $('#reactivateEquipmentName').val(equipmentName);
        $('#reactivateEquipmentReason').val('');
        $('#reactivateEquipmentDate').val('<?php echo date('Y-m-d'); ?>');

        reactivateModal.show();
    });

    // تقديم طلب الإيقاف
    $('#submitDeactivateEquipmentBtn').on('click', function() {
        const equipmentId = $('#deactivateEquipmentId').val();
        const reason = $('#deactivateEquipmentReason').val().trim();
        const date = $('#deactivateEquipmentDate').val();

        if (!reason) {
            alert('يرجى إدخال سبب الإيقاف');
            return;
        }

        const btn = $(this);
        const originalHtml = btn.html();
        btn.prop('disabled', true).html('<i class="fas fa-spinner fa-spin"></i> جارٍ التنفيذ...');

        $.ajax({
            url: 'deactivate_equipment_handler.php',
            type: 'POST',
            dataType: 'json',
            data: {
                action: 'deactivate_equipment',
                equipment_id: equipmentId,
                deactivation_reason: reason,
                deactivation_date: date
            },
            success: function(res) {
                if (res.success) {
                    deactivateModal.hide();
                    alert(res.message);
                    
                    if (res.auto_approved) {
                        setTimeout(function() {
                            location.reload();
                        }, 1000);
                    } else {
                        setTimeout(function() {
                            window.location.href = '../Approvals/requests.php?status=pending';
                        }, 1500);
                    }
                } else {
                    alert('خطأ: ' + res.message);
                    btn.prop('disabled', false).html(originalHtml);
                }
            },
            error: function() {
                alert('خطأ في الاتصال بالخادم');
                btn.prop('disabled', false).html(originalHtml);
            }
        });
    });

    // تقديم طلب إعادة التفعيل
    $('#submitReactivateEquipmentBtn').on('click', function() {
        const equipmentId = $('#reactivateEquipmentId').val();
        const reason = $('#reactivateEquipmentReason').val().trim();
        const date = $('#reactivateEquipmentDate').val();

        const btn = $(this);
        const originalHtml = btn.html();
        btn.prop('disabled', true).html('<i class="fas fa-spinner fa-spin"></i> جارٍ التنفيذ...');

        $.ajax({
            url: 'deactivate_equipment_handler.php',
            type: 'POST',
            dataType: 'json',
            data: {
                action: 'reactivate_equipment',
                equipment_id: equipmentId,
                deactivation_reason: reason,
                deactivation_date: date
            },
            success: function(res) {
                if (res.success) {
                    reactivateModal.hide();
                    alert(res.message);
                    
                    if (res.auto_approved) {
                        setTimeout(function() {
                            location.reload();
                        }, 1000);
                    } else {
                        setTimeout(function() {
                            window.location.href = '../Approvals/requests.php?status=pending';
                        }, 1500);
                    }
                } else {
                    alert('خطأ: ' + res.message);
                    btn.prop('disabled', false).html(originalHtml);
                }
            },
            error: function() {
                alert('خطأ في الاتصال بالخادم');
                btn.prop('disabled', false).html(originalHtml);
            }
        });
    });
});
</script>
